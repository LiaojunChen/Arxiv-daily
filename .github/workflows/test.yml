name: Test
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  calculate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4


      - name: Prepare config
        env:
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: bash .github/scripts/prepare-config.sh

      - name: Run script
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          export DEBUG=true
          uv run --locked src/zotero_arxiv_daily/main.py

      - name: Commit interest profile
        if: success()
        run: |
          if [[ -n "$(git status --short data/interest_profile.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/interest_profile.json
            git commit -m "Update paper interest profile"
            git push
          else
            echo "No interest profile changes to commit."
          fi
