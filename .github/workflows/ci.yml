name: CI
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          # Avoid setup-uv's runtime GitHub Releases lookup, which caused the
          # recurring Unicorn failures in scheduled workflows.
          version: "0.11.29"
          enable-cache: true

      - name: Run deterministic tests
        run: |
          uv run --locked pytest -m "not slow" --cov=src/zotero_arxiv_daily --cov-report=term-missing
