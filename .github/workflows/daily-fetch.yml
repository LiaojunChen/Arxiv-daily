name: Daily ArXiv Paper Fetch

on:
  schedule:
    # UTC 22:00 = Beijing 06:00 (next day)
    - cron: "0 22 * * *"
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt

      - name: Run paper fetch
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          ARXIV_QUERY: ${{ secrets.ARXIV_QUERY }}
          MAX_PAPER_NUM: ${{ secrets.MAX_PAPER_NUM }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          AFFILIATION_MAX_PAPERS: ${{ vars.AFFILIATION_MAX_PAPERS }}
          AFFILIATION_MAX_LLM_PAPERS: ${{ vars.AFFILIATION_MAX_LLM_PAPERS }}
          HF_FALLBACK_DAYS: ${{ vars.HF_FALLBACK_DAYS }}
        run: python scripts/fetch_papers.py

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: npm run build

      - name: Copy papers.json to build output
        run: cp data/papers.json frontend/dist/papers.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5.0.0
